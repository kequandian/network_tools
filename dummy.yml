version: "3.4"
# DEPLOY_OPT: startup: startup api; restart: restart container; deploy: deploy only
services:
 dummy:
    image: arm32v7/api:dummy
    privileged: true
    working_dir: /webapps
    ports:
      - 6000:8080
    environment:
      ROLLBACK_KEEP_NUM: 2
      DOCKER_SOCKET: /var/run/docker.sock
      # DOCKER_ENDPOINT: 172.18.0.1:2375
      DOCKER_CONTAINER: ${DUMMY_TARGET_CONTAINER}
      DEPLOY_OPT: ${DEPLOY_OPT}
      # DUMMY_RUNNER: dummy
      # DUMMY_URL: ${DUMMY_URL}
      #GREENFIELD: dummy
      # URL_SHORT: ${DUMMY_TARGET_URL}
      # USERNAME: root
      # PASSWORD: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tmp/BOOT-INF:/webapps/BOOT-INF
      # - ./tmp/WEB-INF:/webapps/WEB-INF
      - ./tmp/com/jfeat:/webapps/com/jfeat
      - ./local:/webapps/local
      - ./data/lib:/webapps/lib
      - ./data/classes:/webapps/classes
      - ./data/indexes:/webapps/indexes
      - ${DUMMY_WORKING_DIR}:/webapps
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
